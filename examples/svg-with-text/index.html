<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG with text - Container Timing</title>
  </head>
  <body>
    <div style="width: 25em" containertiming>
      <svg
        viewBox="0 0 256 256"
        version="1.1"
        xmlns="http://www.w3.org/2000/svg"
        preserveAspectRatio="xMidYMid"
        containertiming
      >
        <!-- Mimics a typical design-tool export: nested groups with paths,
             text elements mixed in at a deeper level. -->
        <g id="artboard">
          <g id="background">
            <path
              d="M8,0 L248,0 C252.4,0 256,3.6 256,8 L256,248 C256,252.4 252.4,256 248,256 L8,256 C3.6,256 0,252.4 0,248 L0,8 C0,3.6 3.6,0 8,0 Z"
              fill="#1a1a2e"
            />
          </g>
          <g id="icon-group">
            <g id="star-shape">
              <!-- Star made of two overlaid polygons (paths) -->
              <path
                d="M128,32 L142,90 L202,90 L154,126 L170,184 L128,150 L86,184 L102,126 L54,90 L114,90 Z"
                fill="#e94560"
              />
              <path
                d="M128,52 L139,88 L178,88 L148,110 L159,146 L128,126 L97,146 L108,110 L78,88 L117,88 Z"
                fill="#c73652"
              />
            </g>
            <g id="label-group">
              <!-- Text elements sit alongside the paths in the same nesting depth -->
              <text
                x="128"
                y="210"
                text-anchor="middle"
                font-family="Arial, sans-serif"
                font-size="22"
                font-weight="bold"
                fill="#ffffff"
                containertiming
              >Container</text>
              <text
                x="128"
                y="238"
                text-anchor="middle"
                font-family="Arial, sans-serif"
                font-size="14"
                fill="#aaaaaa"
                containertiming
              >Timing API</text>
            </g>
          </g>
        </g>
      </svg>
    </div>
    <script src="./index.js"></script>
  </body>
</html>
